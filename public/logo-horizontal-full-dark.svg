  <title>ManonIT — I make beautiful websites. You dream it, I Manon it.</title>
  <rect width="560" height="170" fill="#1A1A1A"/>
  <line x1="20" y1="100" x2="42" y2="24" stroke="#FF6B1A" stroke-width="7" stroke-linecap="round"/>
