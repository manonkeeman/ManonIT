  <text x="64" y="100" font-family="'American Typewriter', 'Courier Prime', 'Courier New', monospace" font-size="62" font-weight="500" fill="#FBF6EE">M</text>
  <text x="130" y="62" font-family="'American Typewriter', 'Courier Prime', 'Courier New', monospace" font-size="32" font-weight="500" fill="#FBF6EE">Manon</text>
  <text x="245" y="62" font-family="'American Typewriter', 'Courier Prime', 'Courier New', monospace" font-size="32" font-weight="500" fill="#FF6B1A">IT</text>
