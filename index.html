        "acceptedAnswer": {
          "@type": "Answer",
          "text": "De prijs van een website hangt af van de omvang en functionaliteit. Een eenvoudige zakelijke website begint vanaf €1.200 excl. btw. Ik stel altijd een heldere offerte op zodat je precies weet waar je aan toe bent."

        "@type": "Question",

          "@type": "Answer",

        }
      },

        "@type": "Question",

      }
